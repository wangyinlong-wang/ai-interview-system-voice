# Docker Compose 配置 - AI 模拟面试系统
# 
# 使用方式:
#   docker-compose up -d          # 启动所有服务
#   docker-compose down           # 停止所有服务
#   docker-compose logs -f        # 查看日志

version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: ai-interview-frontend
    ports:
      - "5173:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - ai-interview-network
    restart: unless-stopped

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: ai-interview-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/uploads/interview.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-3.5-turbo}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - UPLOAD_DIR=/app/uploads/resumes
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ai-interview-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ai-interview-network:
    driver: bridge
